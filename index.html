<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - Mukherjee Nagar Fixed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #f3f4f6; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; background: #cbd5e1; }
        
        .user-loc-marker {
            background-color: #ff5722; width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        // Mukherjee Nagar Bounds (Slightly relaxed to prevent white tiles at edges)
        const mukhBounds = [
            [28.7000, 77.2000], 
            [28.7250, 77.2300]  
        ];

        const map = L.map('map', { 
            zoomControl: true,
            maxBounds: mukhBounds,
            maxBoundsViscosity: 1.0,
            maxZoom: 18, // OSM limit par set kiya
            minZoom: 10
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            maxNativeZoom: 19, // Ye important hai: 19 tak ke tiles agar honge toh dikhayega, warna 18 ko upscale karega
            bounds: L.latLngBounds(mukhBounds),
            noWrap: true,
            // Caching ko thoda normal rakhte hain white screen avoid karne ke liye
            keepBuffer: 2, 
            updateWhenIdle: false // Isse zoom karte hi tiles load honge, wait nahi karega
        }).addTo(map);

        function fixZoom() {
            const safeMinZoom = map.getBoundsZoom(mukhBounds, true); 
            map.setMinZoom(safeMinZoom);
            map.setView([28.7105, 77.2130], safeMinZoom);
            // Render fix
            map.invalidateSize();
        }

        fixZoom();

        // Markers
        const rooms = [{ coords: [28.7105, 77.2130], name: 'GridLabs - Mukherjee Nagar', price: '₹12,000' }];
        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`<b>${r.name}</b><br>${r.price}`);
        });

        document.getElementById('locate-btn').onclick = () => {
            map.locate({ enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            if (L.latLngBounds(mukhBounds).contains(e.latlng)) {
                map.flyTo(e.latlng, 17, { animate: true, duration: 1.5 }); 
                L.marker(e.latlng, {
                    icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
                }).addTo(map);
            }
        });

        // Event listener to fix rendering issues after zoom
        map.on('zoomend', function() {
            map.invalidateSize();
        });

        window.addEventListener('resize', () => {
            fixZoom();
        });
    </script>
</body>
</html>
