<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - India Precision Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #f3f4f6; overflow: hidden; }

        #map { 
            height: 100vh; 
            width: 100%; 
            background: #f3f4f6; /* Map load hone se pehle grey background dikhega */
        }

        /* --------------------------------------------------------------------
           BOUNDARY GLOW EFFECT: Isse boundary smooth aur realtime lagegi
           -------------------------------------------------------------------- */
        .india-boundary-style {
            filter: drop-shadow(0 0 8px rgba(255, 87, 34, 0.6));
        }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; }
        .leaflet-popup-content { margin: 0; }

        .user-loc-marker {
            background-color: #ff5722; 
            width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px;
            background: #ff5722; border-radius: 50%;
            cursor: pointer; border: 2px solid white;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="radius-panel" class="absolute bottom-8 left-1/2 -translate-x-1/2 z-[1000] bg-white/95 backdrop-blur-md px-6 py-4 rounded-2xl shadow-2xl border border-gray-100 hidden w-72 transition-all">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Search Radius</label>
            <span class="text-sm font-bold text-[#ff5722]"><span id="radius-display">1000</span>m</span>
        </div>
        <input type="range" id="radius-slider" min="100" max="5000" step="100" value="1000" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer outline-none">
    </div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        // Bounds definition
        const indiaBounds = [[6.0, 68.0], [36.0, 98.0]];

        // Initialize Map
        const map = L.map('map', { 
            zoomControl: false,
            maxBounds: indiaBounds,
            maxBoundsViscosity: 1.0, // Dragging ko boundary par 'lock' kar dega
            minZoom: 5,
            preferCanvas: true // Performance ke liye canvas best hai
        }).setView([28.7105, 77.2130], 16);

        // Limit TileLayer to India bounds ONLY
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            bounds: L.latLngBounds(indiaBounds),
            noWrap: true // Duniya repeat nahi hogi
        }).addTo(map);

        // Fetch High-Res GeoJSON
        const geoUrl = 'https://raw.githubusercontent.com/datameet/maps/master/Country/india-composite.geojson';

        fetch(geoUrl) 
            .then(res => res.json())
            .then(data => {
                // World surrounding coords
                const worldCoords = [[90, -180], [90, 180], [-90, 180], [-90, -180]];
                const holes = [];
                
                // Extract holes (India shapes)
                data.features.forEach(f => {
                    const g = f.geometry;
                    if (g.type === "Polygon") {
                        holes.push(g.coordinates[0].map(c => [c[1], c[0]]));
                    } else if (g.type === "MultiPolygon") {
                        g.coordinates.forEach(p => holes.push(p[0].map(c => [c[1], c[0]])));
                    }
                });

                // INVERTED POLYGON MASK: Covers everything but India
                L.polygon([worldCoords, ...holes], {
                    color: '#ff5722',      // Boundary line color
                    weight: 2.5,           // Boundary thickness
                    fillColor: '#f3f4f6',  // Bahar ka map hide karne wala color
                    fillOpacity: 1,        // 100% Opaque (Bahar kuch nahi dikhega)
                    interactive: false,
                    className: 'india-boundary-style' // CSS Glow effect
                }).addTo(map);
            })
            .catch(err => alert("GeoJSON loading failed. Check your internet connection."));

        // Room Markers
        const rooms = [
            { coords: [28.7105, 77.2130], name: 'GridLabs Premium PG', price: '₹12,000' },
            { coords: [28.7112, 77.2125], name: 'UPSC Elite Hub', price: '₹8,500' }
        ];

        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`
                <div class="p-4 min-w-[180px]">
                    <h4 class="text-xs font-bold text-gray-400 uppercase tracking-tighter">GridLabs Verified</h4>
                    <div class="text-lg font-bold text-gray-800">${r.name}</div>
                    <div class="text-xl font-bold text-[#ff5722] mt-1">${r.price}</div>
                    <button class="mt-3 w-full py-2 bg-[#ff5722] text-white text-[10px] font-bold uppercase rounded-md tracking-widest">Reserve</button>
                </div>
            `);
        });

        // Locate Me Logic
        let uMarker, uCircle;
        const slider = document.getElementById('radius-slider');
        const display = document.getElementById('radius-display');
        const panel = document.getElementById('radius-panel');

        document.getElementById('locate-btn').onclick = () => {
            map.locate({ setView: false, enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            map.flyTo(e.latlng, 15, { duration: 1.5 });
            if (uMarker) map.removeLayer(uMarker);
            if (uCircle) map.removeLayer(uCircle);

            uMarker = L.marker(e.latlng, {
                icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
            }).addTo(map);
            
            uCircle = L.circle(e.latlng, parseInt(slider.value), {
                color: '#ff5722', fillColor: '#ff5722', fillOpacity: 0.1, weight: 1.5, dashArray: '6, 10'
            }).addTo(map);

            panel.classList.remove('hidden');
        });

        slider.oninput = (e) => {
            const v = parseInt(e.target.value);
            display.innerText = v;
            if (uCircle) uCircle.setRadius(v);
        };
    </script>
</body>
</html>
