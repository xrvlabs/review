<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - Mukherjee Nagar Fit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #f3f4f6; overflow: hidden; }
        #map { position: absolute; top: 0; left: 0; height: 100%; width: 100%; background: #f3f4f6; }
        
        .user-loc-marker {
            background-color: #ff5722; width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }
        .leaflet-popup-content-wrapper { border-radius: 12px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        // Mukherjee Nagar Tight Bounds
        const mukhBounds = [
            [28.7050, 77.2050], 
            [28.7180, 77.2250]  
        ];

        const map = L.map('map', { 
            zoomControl: true,
            maxBounds: mukhBounds,
            maxBoundsViscosity: 1.0, 
            maxZoom: 19
        });

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            bounds: L.latLngBounds(mukhBounds),
            noWrap: true,
            keepBuffer: 20,
            updateWhenIdle: true
        }).addTo(map);

        // --- DYNAMIC MIN ZOOM LOGIC ---
        function fixZoomAndBounds() {
            // 'inside: true' ensures the map fills the container with the bounds area
            // and won't show any empty gaps on the sides.
            const safeMinZoom = map.getBoundsZoom(mukhBounds, true); 
            map.setMinZoom(safeMinZoom);
            
            // Initial view set to Mukherjee Nagar center
            map.setView([28.7105, 77.2130], safeMinZoom);
        }

        // Run on load
        fixZoomAndBounds();

        // Fix on resize (e.g. mobile rotation)
        window.addEventListener('resize', () => {
            fixZoomAndBounds();
            map.invalidateSize();
        });

        // Markers
        const rooms = [
            { coords: [28.7105, 77.2130], name: 'GridLabs - Mukherjee Nagar', price: '₹12,000' }
        ];

        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`<b>${r.name}</b><br>${r.price}`);
        });

        document.getElementById('locate-btn').onclick = () => {
            map.locate({ enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            if (L.latLngBounds(mukhBounds).contains(e.latlng)) {
                map.flyTo(e.latlng, 17, { animate: true, duration: 1.5 }); 
                L.marker(e.latlng, {
                    icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
                }).addTo(map);
            } else {
                alert("Aap Mukherjee Nagar area ke bahar hain.");
            }
        });
    </script>
</body>
</html>
