<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - Delhi NCR Street View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #f3f4f6; overflow: hidden; }

        #map { 
            height: 100vh; 
            width: 100%; 
            background: #f3f4f6; 
        }

        .user-loc-marker {
            background-color: #ff5722; 
            width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; }
        .leaflet-popup-content { margin: 0; }
        
        /* Zoom Control Styling */
        .leaflet-bar a { background-color: #fff !important; color: #ff5722 !important; border-bottom: 1px solid #eee !important; }
        .leaflet-bar a:hover { background-color: #ff5722 !important; color: #fff !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        // 1. Delhi NCR Bounds
        const ncrBounds = [
            [28.2045, 76.6745], 
            [28.9845, 77.5645]  
        ];

        // 2. Map Configuration
        const map = L.map('map', { 
            zoomControl: true,         // Zoom buttons enable rakhe hain
            scrollWheelZoom: true,      // Mouse se zoom enable
            doubleClickZoom: true,      // Double click se zoom enable
            touchZoom: true,            // Touch/Pinch zoom enable
            maxBounds: ncrBounds,       // Area restriction
            maxBoundsViscosity: 1.0,    // Lock strictly inside NCR
            minZoom: 11,                // Isse zyada zoom out nahi hoga (NCR bird-eye view)
            maxZoom: 19                 // Street level detail tak zoom in hoga
        }).setView([28.6139, 77.2090], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            bounds: L.latLngBounds(ncrBounds),
            noWrap: true
        }).addTo(map);

        // 3. Markers
        const rooms = [
            { coords: [28.7105, 77.2130], name: 'GridLabs - Mukherjee Nagar', price: '₹12,000' },
            { coords: [28.5355, 77.3910], name: 'GridLabs - Noida Sec 62', price: '₹9,500' }
        ];

        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`
                <div class="p-4 min-w-[180px]">
                    <h4 class="text-xs font-bold text-gray-400 uppercase">GridLabs NCR</h4>
                    <div class="text-lg font-bold text-gray-800">${r.name}</div>
                    <div class="text-xl font-bold text-[#ff5722] mt-1">${r.price}</div>
                    <button class="mt-3 w-full py-2 bg-[#ff5722] text-white text-[10px] font-bold uppercase rounded-md">Details</button>
                </div>
            `);
        });

        // 4. Locate Logic (Smooth Zoom In to current position)
        document.getElementById('locate-btn').onclick = () => {
            map.locate({ enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            if (L.latLngBounds(ncrBounds).contains(e.latlng)) {
                // Location milne par street level zoom (16) par fly karega
                map.flyTo(e.latlng, 16, { animate: true, duration: 1.5 }); 
                
                L.marker(e.latlng, {
                    icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
                }).addTo(map);
            } else {
                alert("Aap Delhi NCR area ke bahar hain.");
            }
        });
    </script>
</body>
</html>
