<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - Ultra-Stable NCR Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #f3f4f6; overflow: hidden; }
        
        #map { 
            position: absolute; top: 0; left: 0; height: 100%; width: 100%; 
            background: #f3f4f6; 
        }

        /* GPU Acceleration Hack: Isse tiles ka hila-dhuli smooth ho jati hai */
        .leaflet-tile-container {
            will-change: transform;
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .user-loc-marker {
            background-color: #ff5722; width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        const ncrBounds = [[28.0000, 76.5000], [29.2000, 77.8000]];

        const map = L.map('map', { 
            zoomControl: true,
            maxBounds: ncrBounds,
            maxBoundsViscosity: 1.0, 
            maxZoom: 18,
            // Smooth Zooming settings
            zoomAnimation: true,
            fadeAnimation: true,
            inertia: true, // Momentum dragging enable
            inertiaDelay: 100
        });

        // --- AGGRESSIVE CACHING TILE LAYER ---
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            bounds: L.latLngBounds(ncrBounds),
            noWrap: true,
            
            // Ye wo setting hai jo aapko chahiye:
            // 1. updateWhenIdle: Drag karte waqt render engine ko 'shant' rakhta hai.
            updateWhenIdle: true, 
            
            // 2. keepBuffer: 40 tiles ka buffer matlab poora NCR pehle hi memory mein load ho jayega.
            // Screen ke bahar bhi map render rahega.
            keepBuffer: 40, 
            
            // 3. updateWhenZooming: Zoom ke beech mein naye tiles mangna band.
            updateWhenZooming: false,
            
            // 4. edgeBufferTiles: Screen ke kinaro par extra tiles pehle se fetch karna.
            edgeBufferTiles: 3,
            
            // Performance flags
            className: 'stable-tiles'
        }).addTo(map);

        // Smart Zoom and Layout refresh
        function updateMinZoom() {
            const minZoomNeeded = map.getBoundsZoom(ncrBounds, true); 
            map.setMinZoom(minZoomNeeded);
            map.setView([28.6139, 77.2090], minZoomNeeded);
            map.invalidateSize(); // Force refresh to ensure no crop
        }

        updateMinZoom();

        // Markers
        const rooms = [
            { coords: [28.7105, 77.2130], name: 'GridLabs - Mukherjee Nagar', price: '₹12,000' }
        ];

        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`<div class="p-4"><b>${r.name}</b><br>${r.price}</div>`);
        });

        document.getElementById('locate-btn').onclick = () => {
            map.locate({ enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            if (L.latLngBounds(ncrBounds).contains(e.latlng)) {
                map.flyTo(e.latlng, 16, { animate: true, duration: 1.5 }); 
                L.marker(e.latlng, {
                    icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
                }).addTo(map);
            }
        });

        window.addEventListener('resize', () => {
            updateMinZoom();
        });
    </script>
</body>
</html>
