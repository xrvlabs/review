<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridLabs - Pure India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quantico:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { font-family: 'Quantico', sans-serif; }
        
        #map { 
            height: 100vh; 
            width: 100%; 
            background: #e5e7eb; /* Gray-200 background for a clean base */
        }

        .leaflet-popup-content-wrapper { padding: 0; overflow: hidden; border-radius: 12px; }
        .leaflet-popup-content { margin: 0; }

        .user-loc-marker {
            background-color: #ff5722; 
            width: 18px; height: 18px;
            border-radius: 50%; border: 3px solid white;
            box-shadow: 0 0 15px rgba(255, 87, 34, 0.6);
        }

        /* --------------------------------------------------------------------
           ULTRA-SMOOTH INVERTED BLUR OVERLAY (This hides standard flashes)
           -------------------------------------------------------------------- */
        .gridlabs-blur-overlay {
            /* Full screen layer */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; /* Sitting between tiles and UI */
            pointer-events: none; /* Let users drag through the blur */
            
            /* The 'Mask' part: We cover the whole world but carve India out */
            background-color: #f3f4f6; /* Gray-100 solid color outside */
            opacity: 0.96; /* Very slight translucency */
            
            /* REAL-TIME, REALISTIC BLUR: Using backdrop-filter on the Gray layer */
            -webkit-backdrop-filter: blur(12px) contrast(0.8) brightness(1.1);
            backdrop-filter: blur(12px) contrast(0.8) brightness(1.1);
            
            /* This defines the SHAPE: Uses the SVG generated inside Leaflet */
            -webkit-mask-image: url('#india-cutout-mask');
            mask-image: url('#india-cutout-mask');
            mask-size: cover;
            mask-position: center;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 20px; height: 20px;
            background: #ff5722; border-radius: 50%;
            cursor: pointer; border: 2px solid white;
        }
    </style>
</head>
<body class="bg-[#f3f4f6] overflow-hidden">

    <div id="map"></div>

    <div id="blur-layer" class="gridlabs-blur-overlay hidden"></div>

    <div id="radius-panel" class="absolute bottom-8 left-1/2 -translate-x-1/2 z-[1000] bg-white/90 backdrop-blur-md px-6 py-4 rounded-2xl shadow-2xl border border-gray-100 hidden w-72 transition-all">
        <div class="flex justify-between items-center mb-2">
            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Search Radius</label>
            <span class="text-sm font-bold text-[#ff5722]"><span id="radius-display">1000</span>m</span>
        </div>
        <input type="range" id="radius-slider" min="100" max="5000" step="100" value="1000" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer outline-none">
    </div>

    <button id="locate-btn" class="absolute bottom-8 right-8 z-[1000] bg-white p-4 rounded-full shadow-2xl hover:bg-orange-50 active:scale-90 transition-all group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#ff5722]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>

    <script>
        // High Viscosity Bounds (Solid limits)
        const indiaBounds = [[6.0, 68.0], [36.0, 98.0]];

        const map = L.map('map', { 
            zoomControl: false,
            maxBounds: indiaBounds,
            maxBoundsViscosity: 1.0, // Ironclad drag boundary
            minZoom: 5,
            preferCanvas: true // Required for smoother high-res vector masking
        }).setView([28.7105, 77.2130], 16);

        // Base TileLayer (Crucially limited to India bounds to reduce flashing)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            bounds: L.latLngBounds(indiaBounds) 
        }).addTo(map);

        // Load India composite detailed GeoJSON
        const geoUrl = 'https://raw.githubusercontent.com/datameet/maps/master/Country/india-composite.geojson';

        fetch(geoUrl) 
            .then(res => res.json())
            .then(data => {
                const holes = [];
                
                // Geometry extract
                data.features.forEach(f => {
                    const g = f.geometry;
                    if (g.type === "Polygon") holes.push(g.coordinates[0].map(c => [c[1], c[0]]));
                    else if (g.type === "MultiPolygon") {
                        g.coordinates.forEach(p => holes.push(p[0].map(c => [c[1], c[0]])));
                    }
                });

                // Generate the Inverted Boundary Cutout Mask
                // (Note: This is an un-filled polygon, used strictly for the SVG mask-image generation in the CSS)
                L.polygon([[90, -180], [90, 180], [-90, 180], [-90, -180], ...holes], {
                    color: '#ff5722', // GridLabs orange boundary border
                    weight: 1.5,
                    opacity: 1, // Visible border
                    fillColor: 'black', // Used in generating the SVG cut-out
                    fillOpacity: 0, // Keep standard fill invisible
                    interactive: false,
                    id: 'india-cutout-mask', // Assigning ID for CSS 'mask-image'
                    pane: 'overlayPane' // Default pane (below the blur layer)
                }).addTo(map);

                // Now reveal the blur layer. Since India is now 'carved out', 
                // the blur will cover everything *outside* the boundary.
                document.getElementById('blur-layer').classList.remove('hidden');
            });

        // Room Markers
        const rooms = [
            { coords: [28.7105, 77.2130], name: 'GridLabs Premium PG', price: '₹12,000' },
            { coords: [28.7112, 77.2125], name: 'UPSC Elite Hub', price: '₹8,500' }
        ];

        rooms.forEach(r => {
            L.marker(r.coords).addTo(map).bindPopup(`
                <div class="p-4 min-w-[180px]">
                    <h4 class="text-xs font-bold text-gray-500 uppercase tracking-tighter">Verified Room</h4>
                    <div class="text-lg font-bold text-gray-800">${r.name}</div>
                    <div class="text-xl font-bold text-[#ff5722] mt-1">${r.price}</div>
                    <button class="mt-3 w-full py-2 bg-[#ff5722] text-white text-[10px] font-bold uppercase rounded-md tracking-widest">Reserve</button>
                </div>
            `);
        });

        // Locate Logic
        let uMarker, uCircle;
        const slider = document.getElementById('radius-slider');
        const display = document.getElementById('radius-display');
        const panel = document.getElementById('radius-panel');

        document.getElementById('locate-btn').onclick = () => {
            map.locate({ enableHighAccuracy: true });
        };

        map.on('locationfound', (e) => {
            map.flyTo(e.latlng, 15, { duration: 1.5 });
            if (uMarker) map.removeLayer(uMarker);
            if (uCircle) map.removeLayer(uCircle);

            uMarker = L.marker(e.latlng, {
                icon: L.divIcon({ className: 'custom-icon', html: '<div class="user-loc-marker"></div>', iconSize: [18, 18], iconAnchor: [9, 9] })
            }).addTo(map);
            
            uCircle = L.circle(e.latlng, parseInt(slider.value), {
                color: '#ff5722', fillColor: '#ff5722', fillOpacity: 0.1, weight: 1, dashArray: '5, 10'
            }).addTo(map);

            panel.classList.remove('hidden');
        });

        slider.oninput = (e) => {
            const v = parseInt(e.target.value);
            display.innerText = v;
            if (uCircle) uCircle.setRadius(v);
        };
    </script>
</body>
</html>
